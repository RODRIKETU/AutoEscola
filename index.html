<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabelas de Preços - Autoescola Estrela</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    .navbar {
      background: rgba(15, 15, 30, 0.55);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border-bottom: 1px solid rgba(255, 193, 7, 0.18);
      padding: 0 32px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 4px 32px rgba(0,0,0,0.35);
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .navbar-logo img {
      height: 46px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(255,193,7,0.3));
    }
    .navbar-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .navbar-logo-text span:first-child {
      font-size: 18px;
      font-weight: 800;
      color: #ffc107;
      letter-spacing: 0.5px;
    }
    .navbar-logo-text span:last-child {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.65);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .nav-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center;
    }

    .nav-button {
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .nav-button:hover {
      background: rgba(255,193,7,0.18);
      border-color: rgba(255,193,7,0.5);
      color: #ffc107;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(255,193,7,0.2);
    }
    .nav-button.active {
      background: linear-gradient(135deg, #ffc107, #ff8c00);
      color: #000;
      border-color: transparent;
      box-shadow: 0 4px 20px rgba(255,193,7,0.45);
      font-weight: 700;
    }

    .print-btn {
      background: linear-gradient(135deg, #28a745, #20c65a);
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 16px rgba(40,167,69,0.3);
      flex-shrink: 0;
    }
    .print-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(40,167,69,0.45);
      filter: brightness(1.1);
    }

    /* ── CONTAINER ── */
    .container {
      max-width: 1060px;
      margin: 32px auto;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .tab-content { display: none; padding: 32px; }
    .tab-content.active { display: block; }

    /* ── LOGO OFICIAL ── */
    .official-logo { text-align: center; margin: 0 0 24px 0; }
    .official-logo img { max-width: 480px; height: auto; border-radius: 12px; }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 20px;
      font-size: 13.5px;
      color: #555;
      line-height: 1.7;
      background: #f8f9fa;
      padding: 14px 20px;
      border-radius: 14px;
      border-left: 4px solid #ffc107;
    }
    .header strong { color: #c00; font-size: 14px; }

    /* ── YELLOW-BOX ── */
    .yellow-box {
      background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
      padding: 18px 20px;
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 24px;
      border-radius: 16px;
      color: #1a1a1a;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(255,193,7,0.35);
      text-transform: uppercase;
    }

    /* ── SECTION / COLUMNS ── */
    .section { display: flex; gap: 24px; }
    .left, .right { flex: 1; }

    /* ── GRAY HEADER ── */
    .gray-header {
      background: linear-gradient(135deg, #e9ecef, #dee2e6);
      padding: 12px 16px;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 14px;
      border-radius: 14px;
      color: #333;
      letter-spacing: 0.3px;
    }

    /* ── PRICE BOX ── */
    .box {
      background: #f8f9fb;
      padding: 14px 16px;
      margin-bottom: 12px;
      border-radius: 14px;
      border: 1px solid #e8eaf0;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .box:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      border-color: #ffc107;
    }

    .package {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
      color: #1a1a1a;
    }
    .package span:last-child {
      color: #e65c00;
      font-size: 17px;
    }

    .box-note {
      font-size: 12.5px;
      color: #777;
      font-weight: 500;
    }

    /* ── RED ARROW ── */
    .red-arrow { color: #e53935; font-size: 18px; margin-right: 6px; }

    ul {
      margin: 10px 0 18px 22px;
      line-height: 1.8;
      font-size: 13.5px;
      color: #444;
    }
    ul li::marker { color: #ffc107; }

    p strong { font-size: 13px; color: #333; }

    /* ── CONTACT ── */
    .contact {
      text-align: center;
      margin-top: 24px;
      padding: 20px 16px;
      background: linear-gradient(135deg, #f0fff4, #e8f5e9);
      border-radius: 18px;
      border: 2px solid #a5d6a7;
    }
    .whatsapp {
      color: #1b5e20;
      font-size: 20px;
      font-weight: 700;
      margin: 10px 0;
      letter-spacing: 0.5px;
    }
    .qr-code {
      width: 160px;
      height: 160px;
      border-radius: 14px;
      border: 3px solid #25D366;
      margin: 14px auto;
      display: block;
      box-shadow: 0 4px 16px rgba(37,211,102,0.25);
    }
    .contact p { font-size: 12px; color: #555; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

    /* ── EXPORT BUTTONS ── */
    .nav-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .export-btn {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 9px 16px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .export-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.4);
    }
    .export-btn.pdf  { border-color: rgba(220,53,69,0.5);  color: #ff6b7a; }
    .export-btn.pdf:hover  { background: rgba(220,53,69,0.18);  box-shadow: 0 4px 16px rgba(220,53,69,0.25); }
    .export-btn.img  { border-color: rgba(13,202,240,0.5); color: #5dd8f0; }
    .export-btn.img:hover  { background: rgba(13,202,240,0.18); box-shadow: 0 4px 16px rgba(13,202,240,0.25); }

    /* loading overlay */
    #export-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(10,10,20,0.75);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      color: #fff; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
    }
    #export-overlay.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ffc107;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL DE ESCOPO ── */
    #scope-modal {
      display: none;
      position: fixed; inset: 0; z-index: 10000;
      background: rgba(10,10,20,0.72);
      backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
    }
    #scope-modal.show { display: flex; }
    .modal-box {
      background: rgba(20,24,48,0.97);
      border: 1px solid rgba(255,193,7,0.3);
      border-radius: 22px;
      padding: 36px 28px 26px;
      width: 360px;
      box-shadow: 0 28px 80px rgba(0,0,0,0.65);
      text-align: center;
      font-family: 'Inter', sans-serif;
      color: #fff;
      animation: modal-in 0.22s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.9) translateY(14px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-icon { font-size: 38px; margin-bottom: 14px; }
    .modal-box h3 { font-size: 19px; font-weight: 800; color: #ffc107; margin-bottom: 6px; }
    .modal-box p  { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 26px; line-height: 1.6; }
    .modal-options { display: flex; gap: 12px; margin-bottom: 16px; }
    .modal-opt {
      flex: 1;
      padding: 18px 10px 14px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s;
      line-height: 1.5;
    }
    .modal-opt .opt-icon { font-size: 26px; display: block; margin-bottom: 8px; }
    .modal-opt:hover {
      background: rgba(255,193,7,0.18);
      border-color: rgba(255,193,7,0.65);
      color: #ffc107;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(255,193,7,0.22);
    }
    .modal-cancel {
      background: none; border: none;
      color: rgba(255,255,255,0.38);
      font-size: 13px; cursor: pointer;
      font-family: 'Inter', sans-serif;
      padding: 8px 14px; border-radius: 8px;
      transition: color 0.2s;
    }
    .modal-cancel:hover { color: rgba(255,255,255,0.75); }

    /* ── PRINT-CAPTURE helper (off-screen render) ── */
    .print-capture {
      display: block !important;
      position: fixed !important;
      left: -9999px !important;
      top: 0 !important;
      width: 820px !important;
      background: #fff !important;
      padding: 24px !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      z-index: -1 !important;
    }

    /* ── PRINT A4 ── */
    @media print {
      @page { size: A4 portrait; margin: 10mm 12mm; }

      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

      html { height: auto !important; }
      body { background: #fff !important; min-height: 0 !important; height: auto !important; }

      .navbar, #export-overlay, .nav-actions, #scope-modal { display: none !important; }

      .container {
        box-shadow: none !important;
        border-radius: 10px !important;
        margin: 0 !important;
        max-width: 100% !important;
        border: 1px solid #ddd !important;
        page-break-inside: avoid;
      }

      .tab-content { display: none !important; padding: 16px !important; }
      .tab-content.active { display: block !important; }

      .official-logo { margin-bottom: 8px !important; }
      .official-logo img { max-width: 180px !important; }

      .header {
        font-size: 9.5px !important;
        padding: 7px 12px !important;
        margin-bottom: 9px !important;
        line-height: 1.45 !important;
        border-radius: 8px !important;
      }
      .header strong { font-size: 10px !important; }

      .yellow-box {
        font-size: 13px !important;
        padding: 9px 12px !important;
        margin-bottom: 11px !important;
        border-radius: 8px !important;
        box-shadow: none !important;
      }

      .section { gap: 10px !important; }

      .gray-header {
        font-size: 9.5px !important;
        padding: 6px 10px !important;
        margin-bottom: 7px !important;
        border-radius: 7px !important;
      }

      .box {
        padding: 6px 9px !important;
        margin-bottom: 5px !important;
        border-radius: 7px !important;
      }
      .box:hover { transform: none !important; box-shadow: none !important; }

      .package { font-size: 10.5px !important; margin-bottom: 2px !important; }
      .package span:last-child { font-size: 11.5px !important; }
      .box-note { font-size: 9px !important; }

      ul {
        font-size: 9.5px !important;
        margin: 5px 0 8px 16px !important;
        line-height: 1.5 !important;
      }
      p strong { font-size: 9.5px !important; }

      .contact {
        padding: 9px 10px !important;
        margin-top: 10px !important;
        border-radius: 9px !important;
        border-width: 1px !important;
      }
      .whatsapp { font-size: 12px !important; margin: 4px 0 !important; }
      .qr-code { width: 80px !important; height: 80px !important; margin: 6px auto !important; border-radius: 6px !important; box-shadow: none !important; }
      .contact p { font-size: 8.5px !important; }
      .red-arrow { font-size: 11px !important; }

      /* ── Imprimir TODAS ── */
      body.printing-all .tab-content { display: block !important; }
      body.printing-all .tab-content:not(:last-of-type) { page-break-after: always; }
    }

    /* ── LOADING STATE ── */
    #loading-state {
      display: flex; align-items: center; justify-content: center;
      padding: 80px 20px; flex-direction: column; gap: 16px;
    }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,193,7,0.15);
      border-top-color: #ffc107;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading-state p { color: rgba(255,255,255,0.5); font-size: 13px; }
  </style>
</head>
<body>

  <!-- MENU SUPERIOR -->
  <nav class="navbar">
    <!-- LOGO -->
    <div class="navbar-logo">
      <img id="navbar-logo-img" src="logo.png" alt="Autoescola Estrela" onerror="this.style.display='none'">
      <div class="navbar-logo-text">
        <span>Autoescola Estrela</span>
        <span>Habilitação Rápida</span>
      </div>
    </div>

    <!-- BOTÕES DE NAVEGAÇÃO -->
    <div class="nav-buttons" id="nav-buttons">
      <!-- Preenchido dinamicamente via /api/settings -->
    </div>

    <!-- AÇÕES -->
    <div class="nav-actions">
      <button onclick="askScope('pdf')"   class="export-btn pdf">📄 PDF</button>
      <button onclick="askScope('img')" class="export-btn img">🖼️ Imagem</button>
      <button onclick="askScope('print')" class="print-btn">🖨️ Imprimir</button>
    </div>
  </nav>

  <!-- OVERLAY DE CARREGAMENTO -->
  <div id="export-overlay">
    <div class="spinner"></div>
    <span id="overlay-msg">Gerando exportação...</span>
  </div>

  <!-- MODAL DE ESCOPO (Atual / Todas) -->
  <div id="scope-modal">
    <div class="modal-box">
      <div class="modal-icon" id="modal-icon">🖨️</div>
      <h3 id="modal-title">Imprimir</h3>
      <p>Deseja usar a tabela <strong>atual</strong> ou <strong>todas</strong> as três tabelas?</p>
      <div class="modal-options">
        <button class="modal-opt" onclick="execAction('current')">
          <span class="opt-icon">📄</span>
          Tabela Atual
        </button>
        <button class="modal-opt" onclick="execAction('all')">
          <span class="opt-icon">📚</span>
          Todas (3)
        </button>
      </div>
      <button class="modal-cancel" onclick="closeModal()">✕ Cancelar</button>
    </div>
  </div>

  <!-- Estado de carregamento -->
  <div id="loading-state">
    <div class="loading-spinner"></div>
    <p>Carregando tabelas...</p>
  </div>

  <!-- Tabs container (preenchido pelo JS) -->
  <div id="tabs-root"></div>



  <script>
    // ════════════════════════════════════════════════════════════════════
    //  Carregamento de dados da API
    // ════════════════════════════════════════════════════════════════════
    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        if (!res.ok) throw new Error('API indisponível');
        return await res.json();
      } catch {
        return null;
      }
    }

    function phoneToWaLink(phone) {
      const digits = phone.replace(/\D/g, '');
      const withCountry = digits.startsWith('55') ? digits : '55' + digits;
      return `https://wa.me/${withCountry}`;
    }

    function buildQrUrl(phone) {
      const link = phoneToWaLink(phone);
      return `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}`;
    }

    // Escape de texto para inserção segura em HTML
    function esc(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ════════════════════════════════════════════════════════════════════
    //  Renderização das tabs
    // ════════════════════════════════════════════════════════════════════
    function renderTabs(plans, phone, logo) {
      const qrUrl  = buildQrUrl(phone);
      const logoEl = document.getElementById('navbar-logo-img');

      if (logo) {
        logoEl.src = logo;
        logoEl.style.display = 'block';
      }

      document.getElementById('nav-buttons').innerHTML = plans.map((tab, i) =>
        `<button class="nav-button${i === 0 ? ' active' : ''}" onclick="showTab(${i})">${esc(tab.navLabel)}</button>`
      ).join('');

      document.getElementById('tabs-root').innerHTML = plans.map((tab, i) => `
        <div id="tab${i}" class="container tab-content${i === 0 ? ' active' : ''}">
          <div class="official-logo">
            ${logo
              ? `<img src="${logo}" alt="Logo Autoescola Estrela">`
              : `<img src="logo.png" alt="Autoescola Estrela" onerror="this.style.display='none'">`
            }
          </div>
          <div class="header">
            <strong>PROMOÇÃO VÁLIDA ATÉ 30 DESTE MÊS NESTA UNIDADE</strong><br>
            AUTOESCOLA rápida, barata e sem enrolação?<br>
            Resolvemos isso pra você!<br>
            HORÁRIO EXCLUSIVO: Segunda a sexta: 6h às 22h e Sábado: até 12h
          </div>
          <div class="yellow-box">${esc(tab.yellowBox).replace(/\n/g, '<br>')}</div>
          <div class="section">
            <div class="left">
              <div class="gray-header">${esc(tab.leftHeader).replace(/\n/g, '<br>')}</div>
              ${tab.packages.map(pkg => `
                <div class="box">
                  <div class="package">
                    <span>${esc(pkg.label)}</span>
                    <span>R$ ${esc(pkg.priceLeft)}</span>
                  </div>
                  <div class="box-note">${esc(pkg.noteLeft)}</div>
                </div>
              `).join('')}
              <p><strong>INCLUSO NOS PACOTES:</strong></p>
              <ul>${tab.leftIncluded.map(it => `<li>${esc(it)}</li>`).join('')}</ul>
              <p><strong>NÃO INCLUSO NOS PACOTES:</strong></p>
              <ul>${tab.leftNotIncluded.map(it => `<li>${esc(it)}</li>`).join('')}</ul>
            </div>
            <div class="right">
              <div class="gray-header"><span class="red-arrow">✦</span> ${esc(tab.rightHeader)}</div>
              ${tab.packages.map(pkg => `
                <div class="box">
                  <div class="package">
                    <span>${esc(pkg.label)}</span>
                    <span>R$ ${esc(pkg.priceRight)}</span>
                  </div>
                  <div class="box-note">${esc(pkg.noteRight)}</div>
                </div>
              `).join('')}
              <p><strong>INCLUSO NOS PACOTES:</strong></p>
              <ul>${tab.rightIncluded.map(it => `<li>${esc(it)}</li>`).join('')}</ul>
              <div class="contact">
                <div class="whatsapp">📱 WhatsApp: ${esc(phone)}</div>
                <img src="${qrUrl}" alt="QR Code WhatsApp" class="qr-code">
                <p>Matrícula online pelo WhatsApp</p>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ════════════════════════════════════════════════════════════════════
    //  Inicialização
    // ════════════════════════════════════════════════════════════════════
    window.addEventListener('DOMContentLoaded', async () => {
      const settings = await loadSettings();
      document.getElementById('loading-state').style.display = 'none';

      if (settings && Array.isArray(settings.plans) && settings.plans.length > 0) {
        renderTabs(settings.plans, settings.phone || '', settings.logo || '');
      } else {
        document.getElementById('tabs-root').innerHTML = `
          <div style="text-align:center;padding:60px 20px;color:rgba(255,255,255,0.5);">
            <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
            <p style="font-size:16px;">Não foi possível carregar as tabelas.</p>
            <p style="font-size:13px;margin-top:8px;">Verifique se o servidor está rodando em http://localhost:3000</p>
          </div>`;
      }
    });

    // ════════════════════════════════════════════════════════════════════
    //  Navegação
    // ════════════════════════════════════════════════════════════════════
    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab' + n).classList.add('active');
      document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.nav-button')[n].classList.add('active');
    }

    /* ── MODAL ── */
    let _pendingAction = null;
    const MODAL_ICONS  = { print: '🖨️', pdf: '📄', img: '🖼️' };
    const MODAL_TITLES = { print: 'Imprimir', pdf: 'Exportar PDF', img: 'Exportar Imagem' };

    function askScope(type) {
      _pendingAction = type;
      document.getElementById('modal-icon').textContent  = MODAL_ICONS[type];
      document.getElementById('modal-title').textContent = MODAL_TITLES[type];
      document.getElementById('scope-modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('scope-modal').classList.remove('show');
    }

    function execAction(scope) {
      const type = _pendingAction;
      closeModal();
      if (!type) return;
      const all = scope === 'all';
      if (type === 'print') doPrint(all);
      else if (type === 'pdf') doPDF(all);
      else if (type === 'img') doImg(all);
    }

    /* fechar modal clicando fora */
    document.getElementById('scope-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    /* ── IMPRIMIR ── */
    function doPrint(all) {
      if (all) {
        document.body.classList.add('printing-all');
        window.print();
        window.addEventListener('afterprint', () => {
          document.body.classList.remove('printing-all');
        }, { once: true });
      } else {
        window.print();
      }
    }

    /* ── CAPTURA OFF-SCREEN ── */
    async function captureTab(tabId) {
      const tab = document.getElementById(tabId);
      tab.classList.add('print-capture');
      await new Promise(r => setTimeout(r, 220));
      const canvas = await html2canvas(tab, {
        scale: 2, useCORS: true, allowTaint: true,
        backgroundColor: '#ffffff', logging: false
      });
      tab.classList.remove('print-capture');
      return canvas;
    }

    function getActiveIndex() {
      return [...document.querySelectorAll('.tab-content')].findIndex(t => t.classList.contains('active'));
    }

    /* ── PDF ── */
    async function doPDF(all) {
      const overlay = document.getElementById('export-overlay');
      const msg = document.getElementById('overlay-msg');
      overlay.classList.add('show');
      const LABELS = ['1 Categoria', '2 Categorias', 'Inclusão'];
      const SLUGS  = ['1-categoria', '2-categorias', 'inclusao'];
      const PW = 186, PH = 277;
      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const tabIds = all ? ['tab0','tab1','tab2'] : ['tab' + getActiveIndex()];
        for (let i = 0; i < tabIds.length; i++) {
          const idx = parseInt(tabIds[i].replace('tab',''));
          msg.textContent = all
            ? `Processando tabela ${i+1} de 3 — ${LABELS[idx]}...`
            : `Gerando PDF — ${LABELS[idx]}...`;
          const canvas = await captureTab(tabIds[i]);
          const imgData = canvas.toDataURL('image/jpeg', 0.93);
          const ratio = canvas.width / canvas.height;
          let w = PW, h = PW / ratio;
          if (h > PH) { h = PH; w = PH * ratio; }
          if (i > 0) pdf.addPage();
          pdf.addImage(imgData, 'JPEG', (210-w)/2, (297-h)/2, w, h);
        }
        msg.textContent = 'Salvando PDF...';
        const fname = all
          ? 'tabelas-autoescola-estrela.pdf'
          : `tabela-autoescola-${SLUGS[getActiveIndex()]}.pdf`;
        pdf.save(fname);
      } catch (e) {
        console.error(e);
        alert('Erro ao gerar PDF. Verifique o console.');
      } finally {
        overlay.classList.remove('show');
      }
    }

    /* ── IMAGEM ── */
    async function doImg(all) {
      const overlay = document.getElementById('export-overlay');
      const msg = document.getElementById('overlay-msg');
      const SLUGS = ['1-categoria', '2-categorias', 'inclusao'];
      overlay.classList.add('show');
      try {
        const tabIds = all ? ['tab0','tab1','tab2'] : ['tab' + getActiveIndex()];
        for (let i = 0; i < tabIds.length; i++) {
          const idx = parseInt(tabIds[i].replace('tab',''));
          msg.textContent = all ? `Gerando imagem ${i+1} de 3...` : 'Gerando imagem...';
          const canvas = await captureTab(tabIds[i]);
          const link = document.createElement('a');
          link.download = `tabela-autoescola-${SLUGS[idx]}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
          if (all && i < tabIds.length - 1) await new Promise(r => setTimeout(r, 350));
        }
      } catch (e) {
        console.error(e);
        alert('Erro ao gerar imagem. Verifique o console.');
      } finally {
        overlay.classList.remove('show');
      }
    }
  </script>
</body>
</html>
